<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - SWARNALAYA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { background: #050505; }
        .dashboard { display: grid; grid-template-columns: 250px 1fr; min-height: 100vh; }
        @media (max-width: 768px) { .dashboard { grid-template-columns: 1fr; } .sidebar { display: none;} }
        
        .sidebar { background: var(--bg-card); padding: 2rem; border-right: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column; }
        .sidebar h2 { color: var(--primary); margin-bottom: 2rem; letter-spacing: 2px; font-size: 1.5rem;}
        .sidebar a { display: block; color: var(--text-muted); padding: 1rem; border-radius: 8px; margin-bottom: 0.5rem; transition: all 0.2s;}
        .sidebar a:hover, .sidebar a.active { background: rgba(212,175,55,0.1); color: var(--primary); }
        
        .main-content { padding: 3rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; margin-bottom: 3rem; }
        .stat-card { background: var(--bg-card); padding: 1.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .stat-card h3 { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2.2rem; font-weight: 700; color: var(--primary); }
        
        .content-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 2rem; }
        @media (max-width: 1100px) { .content-grid { grid-template-columns: 1fr; } }
        
        .panel { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .panel-header { margin-bottom: 1.5rem; color: var(--text-main); font-size: 1.2rem; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 1.2rem 1rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); font-weight: 500; text-transform: uppercase; font-size: 0.85rem;}
        .badge { padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem; background: rgba(212,175,55,0.2); color: var(--primary); white-space: nowrap;}
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <h2 class="animate-fade">SWARNALAYA. ADMIN</h2>
            <div class="animate-fade" style="animation-delay: 0.1s; display: flex; flex-direction: column; flex: 1;">
                <a href="#" class="active">Overview Dashboard</a>
                <a href="#" onclick="UI.showToast('Full catalog manager coming soon')">Manage Catalog</a>
                <a href="#" onclick="UI.showToast('Full orders tracking coming soon')">Track Orders</a>
                <a href="#" onclick="UI.showToast('Customer accounts coming soon')">Customer Data</a>
                <a href="#" onclick="Auth.logout()" style="margin-top: auto; color: var(--danger)">Sign Out & Lock</a>
            </div>
        </div>
        
        <div class="main-content animate-fade" style="animation-delay: 0.2s;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h1>Dashboard Overview</h1>
                <a href="index.html" target="_blank" class="btn btn-outline" style="width: auto; padding: 0.6rem 1.5rem; font-size: 0.9rem;">View Public Store</a>
            </div>
            
            <div class="stats-grid" id="stats-container">
                <!-- Injected via JS -->
                <div class="stat-card"><h3>Loading</h3><div class="value">...</div></div>
            </div>
            
            <div class="content-grid">
                <div class="panel">
                    <h2 class="panel-header">Publish New Product</h2>
                    <form id="add-product-form" onsubmit="addProduct(event)">
                        <input type="text" id="p-name" placeholder="Product Title (e.g., Diamond Cuff)" required>
                        <input type="text" id="p-category" placeholder="Category (e.g., Rings, Necklaces)" required>
                        <input type="number" id="p-price" step="0.01" placeholder="Selling Price ($)" required>
                        <textarea id="p-desc" placeholder="Exquisite description details..." rows="3"></textarea>
                        
                        <label style="color:var(--text-muted); font-size:0.9rem; margin-bottom:0.8rem; display:block;">Cover Media Image (Optional)</label>
                        <input type="file" id="p-image" accept="image/*" style="padding: 0.8rem; background: rgba(0,0,0,0.2);">
                        
                        <button type="submit" class="btn" style="margin-top: 1rem" id="btn-add-product">Publish to Storefront</button>
                    </form>
                </div>
                
                <div class="panel">
                    <h2 class="panel-header">Recent Transactions</h2>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ref ID</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Value</th>
                                </tr>
                            </thead>
                            <tbody id="recent-orders-list">
                                <tr><td colspan="4" style="text-align:center; color:var(--text-muted)">Synchronizing logs...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin.js"></script>
</body>
</html>
